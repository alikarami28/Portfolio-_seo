<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه پیدا نشد | ۴۰۴ | علی کرمی</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent-color: #3b82f6;
        }
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        .error-container { max-width: 500px; }
        .error-code {
            font-size: 120px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: var(--text-primary);
        }
        .error-text {
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.8;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--accent-color);
            color: #fff;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        .btn i { margin-left: 8px; }
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-btn" aria-label="تغییر تم">
        <i class="fa-solid fa-moon"></i>
    </button>

    <div class="error-container">
        <div class="error-code">۴۰۴</div>
        <h1 class="error-title">😕 اوه! صفحه پیدا نشد</h1>
        <p class="error-text">
            صفحه‌ای که دنبالش هستید وجود نداره، حذف شده یا آدرسش اشتباهه.
            <br>
            بیایید شما رو به صفحه اصلی راهنمایی کنم.
        </p>
        <a href="/" class="btn">
            بازگشت به خانه
            <i class="fa-solid fa-arrow-left"></i>
        </a>
    </div>

    <script>
        var btn = document.getElementById('theme-btn');
        var icon = btn.querySelector('i');
        
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            icon.classList.replace('fa-moon', 'fa-sun');
        }
        
        btn.addEventListener('click', function() {
            if (document.body.getAttribute('data-theme') === 'dark') {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                icon.classList.replace('fa-sun', 'fa-moon');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                icon.classList.replace('fa-moon', 'fa-sun');
            }
        });
    </script>
</body>
</html>
